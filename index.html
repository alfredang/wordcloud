<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Word Cloud</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ==================== FACILITATOR VIEW ==================== -->
<div id="facilitator-view" class="hidden">
  <div class="f-header">
    <div class="f-title">Live Word Cloud</div>
    <div class="f-stats">
      <span>Participants: <span class="num" id="stat-participants">0</span></span>
      <span>Responses: <span class="num" id="stat-responses">0</span></span>
      <span>Unique words: <span class="num" id="stat-unique">0</span></span>
    </div>
  </div>

  <!-- Question -->
  <div class="f-question-bar glass" id="question-bar">
    <span class="f-question-text" id="question-display"></span>
    <button class="btn btn-ghost" onclick="startEditQuestion()">Edit</button>
  </div>

  <!-- Toolbar -->
  <div class="f-toolbar">
    <button class="btn btn-ghost" onclick="newSession()">New Session</button>
    <button class="btn btn-danger" onclick="clearSubmissions()">Clear All</button>
    <button class="btn btn-ghost" id="lock-btn" onclick="toggleLock()">Lock</button>
    <button class="btn btn-ghost" id="dupes-btn" onclick="toggleDuplicates()">Dupes: Off</button>
    <div class="f-view-toggle">
      <button class="active" id="view-cloud-btn" onclick="setView('cloud')">Cloud</button>
      <button id="view-list-btn" onclick="setView('list')">List</button>
    </div>
    <button class="btn btn-ghost" onclick="loadDemo()">Demo Data</button>
    <button class="btn btn-ghost" onclick="toggleFullscreen()">Fullscreen</button>
    <button class="btn btn-ghost" onclick="exportPNG()">Export PNG</button>
  </div>

  <!-- Main -->
  <div class="f-main">
    <div class="f-cloud-wrap glass" id="cloud-container">
      <div id="word-cloud">
        <div class="wc-empty" id="cloud-empty">
          <div class="wc-empty-icon">&#x1F4AD;</div>
          <div>Waiting for responses...</div>
        </div>
      </div>
      <!-- List view (hidden by default) -->
      <div class="f-list-view hidden" id="list-view"></div>
    </div>

    <!-- Sidebar -->
    <div class="f-sidebar glass">
      <div class="f-qr-wrap">
        <canvas id="qr-canvas"></canvas>
        <div class="f-join-label">Scan to join &amp; submit your word</div>
        <div class="f-join-url" id="join-url-display" style="cursor:pointer" onclick="copyJoinURL()" title="Click to copy"></div>
      </div>
      <div style="text-align:center">
        <div style="font-size:0.75rem;color:var(--text-muted);margin-bottom:4px">Room Code</div>
        <div class="f-room-code" id="room-code-display" style="cursor:pointer" onclick="copyRoomCode()" title="Click to copy"></div>
      </div>
    </div>
  </div>
</div>

<!-- ==================== PARTICIPANT VIEW ==================== -->
<div id="participant-view" class="hidden">
  <div class="p-card glass">
    <div class="p-badge">Live Activity</div>
    <div class="p-question" id="p-question"></div>

    <div class="p-input-wrap" id="p-form">
      <input type="text" class="p-input" id="p-input" placeholder="Type your word..." maxlength="40" autocomplete="off">
      <button class="p-submit" id="p-submit-btn" onclick="submitWord()">Submit</button>
    </div>

    <div class="p-feedback hidden" id="p-feedback"></div>
    <div class="p-locked hidden" id="p-locked-msg">Submissions are currently closed.</div>

    <div class="p-history" id="p-history"></div>
  </div>
</div>

<!-- ==================== QUESTION EDIT MODAL ==================== -->
<div class="modal-overlay hidden" id="modal-question">
  <div class="modal glass">
    <h3>Edit Question</h3>
    <input type="text" id="modal-q-input" placeholder="Enter your question..." maxlength="200">
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeModal('modal-question')">Cancel</button>
      <button class="btn btn-accent" onclick="saveQuestion()">Save</button>
    </div>
  </div>
</div>

<!-- QR Code library (MIT license) -->
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<!-- Firebase SDK (Realtime Database for cross-device sync) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<!--
  Firebase config loading order:
  1. firebase-config.js (has placeholders, replaced by CI at deploy time)
  2. For local dev: rename firebase-config.local.js to firebase-config.js
     or use the local dev server script below
-->
<footer class="site-footer">
  Powered by <a href="https://www.tertiarycourses.com.sg/" target="_blank" rel="noopener noreferrer">Tertiary Infotech Academy Pte Ltd</a>
</footer>

<script src="firebase-config.js"></script>
<script src="app.js"></script>
</body>
</html>
